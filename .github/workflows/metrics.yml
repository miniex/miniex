name: Metrics

on:
  schedule:
    # 06, 12, 18, 24 KST (UTC+9) -> 21, 03, 09, 15 UTC
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  languages:
    name: Top languages (with external contributions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: miniex
          filename: assets/languages.svg
          committer_message: "chore: update raw language stats"
          base: ""
          template: classic
          config_timezone: Asia/Seoul
          config_padding: "12, 12"

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, tex, makefile, dockerfile
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_colors: github

          extras_css: |
            :root {
              --bg: #fff5f8;
              --title: #c85a80;
              --text: #8b3a5e;
              --muted: #b87a93;
            }
            @media (prefers-color-scheme: dark) {
              :root {
                --bg: #1e1425;
                --title: #ffc8e0;
                --text: #f0d0e0;
                --muted: #c89bb3;
              }
            }
            .bg-rect { fill: var(--bg) !important; }
            h2.field { display: none !important; }
            h3 { color: var(--title) !important; font-size: 16px !important; margin: 8px 0 4px !important; font-weight: 600 !important; }
            section.column > small { color: var(--muted) !important; font-size: 10px !important; opacity: 0.75; margin-bottom: 6px; }
            .field.language.details > .field { color: var(--text) !important; font-weight: 500 !important; }
            .field.language.details small > div:first-child { color: var(--muted) !important; }
            .field.language.details small > div:last-child { color: var(--text) !important; font-weight: 600 !important; }

      - name: Inject rounded background and clip path
        run: |
          python3 - <<'PY'
          import re, sys
          path = 'assets/languages.svg'
          svg = open(path).read()
          if 'id="rounded-clip"' in svg:
              print('Already rounded; skipping injection.')
              sys.exit(0)
          m = re.search(r'<svg[^>]*\swidth="(\d+)"[^>]*\sheight="(\d+)"', svg)
          w, h = m.group(1), m.group(2)
          radius = 28
          clip = f'<clipPath id="rounded-clip"><rect width="{w}" height="{h}" rx="{radius}" ry="{radius}"/></clipPath>'
          bg = f'<rect class="bg-rect" width="{w}" height="{h}" rx="{radius}" ry="{radius}"/>'
          svg = svg.replace('<style/>', f'<style/>{clip}', 1)
          svg = svg.replace('</defs>', f'</defs>{bg}<g clip-path="url(#rounded-clip)">', 1)
          svg = svg.replace('</svg>', '</g></svg>', 1)
          open(path, 'w').write(svg)
          PY

      - name: Commit rounded SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --ff-only
          git add assets/languages.svg
          if git diff --staged --quiet; then
            echo "No rounding changes to commit."
            exit 0
          fi
          git commit -m "style: round language stats svg corners"
          git push
